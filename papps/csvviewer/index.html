<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Viewer (ui-catalog)</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MSTVN0KCF9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-MSTVN0KCF9');
    </script>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- PapaParse for robust CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- html2pdf.js for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div id="app">
        <main class="catalog-main">
            <!-- Header section mimicking catalog styling -->
            <header class="catalog-header">
                <div class="header-top">
                    <h1 data-i18n="appTitle">CSV Viewer</h1>
                    <div class="actions" style="display: flex; gap: 8px; align-items: center;">
                        <button id="pdf-export-btn" class="btn btn-secondary hidden" title="現在の表示内容をPDFとして出力します"
                            data-i18n-title="pdfExportDesc">
                            <span class="material-symbols-outlined"
                                style="vertical-align: middle; margin-right: 4px;">picture_as_pdf</span>
                            <span data-i18n="pdfExport">PDF書き出し</span>
                        </button>

                        <label for="csv-file-input" class="btn btn-primary" style="cursor: pointer;"
                            data-i18n-title="csvSelectDesc" title="CSVファイルを選択するか、ここにドラッグ＆ドロップしてください">
                            <span class="material-symbols-outlined"
                                style="vertical-align: middle; margin-right: 4px;">upload_file</span>
                            <span data-i18n="csvSelect">CSVを選択</span>
                        </label>
                        <input type="file" id="csv-file-input" accept=".csv" class="hidden">

                        <!-- Utility Actions: Share -->
                        <div class="utility-actions"
                            style="display: flex; gap: 8px; margin-left: 8px; border-left: 1px solid var(--border-color); padding-left: 8px;">
                            <button id="x-share-btn" class="btn btn-icon" title="X(Twitter)に投稿する">
                                <svg viewBox="0 0 24 24" aria-hidden="true" width="20" height="20" fill="currentColor">
                                    <path
                                        d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Filters section -->
                <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: flex-start;">

                    <!-- Search Feature -->
                    <div class="search-box" style="flex: 1; min-width: 200px; max-width: 400px;">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text" id="search-input" placeholder="テーブル内全体を検索..."
                            data-i18n-placeholder="searchPlaceholder">
                    </div>

                    <!-- Column Selection & Category Checkboxes -->
                    <div id="advanced-filter-wrapper" class="hidden"
                        style="flex: 2; min-width: 300px; display: flex; flex-direction: column; gap: 8px;">
                        <div class="select-wrapper" style="max-width: 250px;">
                            <select id="column-select" class="form-select">
                                <option value="" selected data-i18n="filterColumnSelect">フィルターする列を選択...</option>
                                <!-- Dynamically populated with headers -->
                            </select>
                            <span class="material-symbols-outlined select-arrow">expand_more</span>
                        </div>

                        <!-- Checkboxes Container -->
                        <div id="category-checkbox-container" class="hidden checkbox-grid">
                            <!-- Dynamically populated with checkboxes -->
                        </div>
                    </div>
                </div>
            </header>

            <!-- Table data display section -->
            <section class="catalog-section" style="margin-bottom: 0;">
                <div id="drop-zone" class="component-card table-wrapper"
                    style="padding: 0; overflow: hidden; display: flex; flex-direction: column; max-height: calc(100vh - 250px); position: relative;">
                    <div id="drop-overlay" class="hidden"
                        style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(94, 106, 210, 0.1); border: 2px dashed var(--accent-color); z-index: 10; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(2px);">
                        <div
                            style="text-align: center; color: var(--accent-color); font-weight: bold; pointer-events: none;">
                            <span class="material-symbols-outlined"
                                style="font-size: 3rem; display: block; margin-bottom: 8px;">upload_file</span>
                            <span data-i18n="dropZoneText">ここにCSVファイルをドロップ</span>
                        </div>
                    </div>

                    <!-- Note: The element ID pdf-content is what will be passed to html2pdf -->
                    <div id="pdf-content" class="table-container" style="overflow: auto; flex: 1;">
                        <table class="demo-table" id="csv-table">
                            <thead id="csv-thead">
                                <tr>
                                    <th data-i18n="tableInitialText">ここにCSVデータが表示されます</th>
                                </tr>
                            </thead>
                            <tbody id="csv-tbody">
                                <tr>
                                    <td class="empty-state" style="text-align: center; padding: 3rem;">
                                        <span class="material-symbols-outlined"
                                            style="font-size: 2.5rem; color: var(--text-secondary); margin-bottom: 1rem; display: block;">post_add</span>
                                        <span
                                            data-i18n="emptyStateText">右上の「CSVを選択」ボタンからファイルを選ぶか<br>ここにファイルをドラッグ＆ドロップしてください。</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="component-desc"
                    style="margin-top: 12px; border: none; padding-top: 0; display: flex; justify-content: space-between;">
                    <span id="record-count" style="font-size: 0.85rem; color: var(--text-secondary);">0件のレコード</span>
                    <span style="font-size: 0.85rem; color: var(--text-secondary);"
                        data-i18n="modalHint">※行をクリックで詳細表示（モーダル）</span>
                </div>
            </section>

            <!-- App Footer (Copyright) -->
            <footer class="app-footer">
                <a href="https://piyohico1.github.io/webapps/" target="_blank" rel="noopener noreferrer"
                    class="copyright-link">
                    @ piyohico apps
                </a>
            </footer>
        </main>
    </div>

    <!-- Details Modal (Based unconditionally on ui-catalog Modal) -->
    <div id="detail-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" data-i18n="modalTitle">行の詳細データ</h3>
                <button id="modal-close" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-body-content" style="max-height: 60vh; overflow-y: auto;">
                <!-- Dynamically filled with data -->
            </div>
            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary" data-i18n="modalClose">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="modal-overlay hidden" style="z-index: 10000;">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;">
            <div class="spinner"
                style="width: 40px; height: 40px; border-width: 4px; border-color: var(--accent-color) transparent var(--accent-color) transparent;">
            </div>
            <p style="color: var(--text-primary); font-weight: bold; text-shadow: 0 1px 2px rgba(255,255,255,0.5);"
                data-i18n="loadingText">
                処理中...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
